  <style>
    .faq-list { max-width: 720px; margin: 0 auto; }
    .faq-item { border: 1px solid var(--border); border-radius: 4px; margin-bottom: 12px; overflow: hidden; }
    .faq-question { padding: 20px 24px; cursor: pointer; color: var(--cream); font-family: var(--font-head); font-size: 1.1rem; list-style: none; display: flex; justify-content: space-between; align-items: center; }
    .faq-question::-webkit-details-marker { display: none; }
    .faq-question::after { content: '+'; color: var(--gold); font-size: 1.4rem; transition: transform .2s; }
    details[open] .faq-question::after { transform: rotate(45deg); }
    .faq-answer { padding: 0 24px 20px; color: var(--text-dim); line-height: 1.8; border-top: 1px solid var(--border); padding-top: 16px; }
  </style>
</head>
